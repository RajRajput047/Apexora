services:
  - type: web
    name: apexora
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn Apexora.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: apexora-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,apexora.com,your-custom-domain.com"

databases:
  - name: apexora-db
    databaseName: apexora
    user: apexora
    plan: free # or starter, pro etc.